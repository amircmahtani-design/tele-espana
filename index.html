<style>
  :root{--bg:#15101b;--bg2:#1d1626;--card:#231a2e;--card2:#2b2138;--line:#3a2e49;--ink:#f4efe7;--muted:#a99fb5;--muted2:#7c7188;--gold:#f0b646;--red:#e0463a;--redhot:#ff5a4d;--r:18px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:radial-gradient(120% 80% at 100% 0%, rgba(224,70,58,.18), transparent 55%),radial-gradient(90% 60% at 0% 0%, rgba(240,182,70,.10), transparent 50%),var(--bg);color:var(--ink);font-family:"Manrope",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px;}
  header{position:sticky;top:0;z-index:30;padding-top:calc(env(safe-area-inset-top) + 14px);padding-bottom:10px;background:linear-gradient(180deg,var(--bg) 80%,rgba(21,16,27,0));backdrop-filter:blur(3px);}
  .brandrow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .brand{font-family:"Fraunces",serif;font-weight:900;font-size:26px;letter-spacing:-.01em;line-height:1;}
  .brand .es{color:var(--gold);font-style:italic;font-weight:700;}
  .clock{text-align:right;line-height:1.15;}
  .clock .t{font-family:"Fraunces",serif;font-weight:700;font-size:21px;font-variant-numeric:tabular-nums;}
  .clock .d{font-size:11px;color:var(--muted);text-transform:capitalize;letter-spacing:.02em;}
  .statusrow{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;}
  .live .dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;}
  .live.on{color:var(--redhot);}.live.on .dot{background:var(--redhot);}
  .live.sample{color:var(--gold);}.live.sample .dot{background:var(--gold);animation:none;}
  .srcnote{font-size:10.5px;color:var(--muted2);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,77,.55)}70%{box-shadow:0 0 0 9px rgba(255,90,77,0)}100%{box-shadow:0 0 0 0 rgba(255,90,77,0)}}
  .search{position:relative;margin-top:11px;}
  .search input{width:100%;padding:12px 14px 12px 42px;border-radius:14px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);font-family:inherit;font-size:15px;outline:none;}
  .search input::placeholder{color:var(--muted2);}
  .search input:focus{border-color:var(--gold);}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--muted2);}
  /* date strip */
  .days{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:11px;padding-bottom:2px;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{flex:0 0 auto;min-width:58px;padding:8px 12px;border-radius:13px;border:1px solid var(--line);background:var(--bg2);text-align:center;cursor:pointer;transition:.15s;}
  .day .dtop{font-size:12.5px;font-weight:800;line-height:1.1;text-transform:capitalize;}
  .day .dsub{font-size:11px;color:var(--muted2);font-weight:700;font-variant-numeric:tabular-nums;}
  .day.sel{background:linear-gradient(160deg,var(--gold),#d99a2e);border-color:transparent;color:#1a1221;}
  .day.sel .dsub{color:rgba(26,18,33,.7);}
  .list{padding:8px 0 90px;display:flex;flex-direction:column;gap:12px;}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--r);padding:14px;cursor:pointer;transition:transform .12s ease;position:relative;overflow:hidden;}
  .card:active{transform:scale(.985);}
  .card .top{display:flex;align-items:center;gap:12px;}
  .logo{width:50px;height:50px;flex:0 0 50px;border-radius:13px;display:grid;place-items:center;font-family:"Fraunces",serif;font-weight:900;font-size:15px;color:#15101b;text-align:center;line-height:.95;letter-spacing:-.02em;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);overflow:hidden;}
  .logo img{width:100%;height:100%;object-fit:contain;background:#fff;}
  .ch-meta{min-width:0;flex:1;}
  .ch-name{font-weight:800;font-size:15px;letter-spacing:.01em;}
  .ch-num{font-size:11px;color:var(--muted2);font-weight:600;}
  .chev{color:var(--muted2);font-size:20px;font-weight:700;padding-left:6px;}
  .now-title{font-family:"Fraunces",serif;font-weight:600;font-size:17px;margin:9px 0 2px;line-height:1.2;}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600;}
  .badge{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:6px;color:#15101b;}
  .progwrap{margin-top:11px;}
  .bar{height:5px;border-radius:99px;background:var(--bg);overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:99px;}
  .next{margin-top:9px;font-size:12.5px;color:var(--muted);display:flex;gap:7px;}
  .next b{color:var(--ink);font-weight:600;}
  .next .lbl{color:var(--muted2);text-transform:uppercase;font-size:10px;letter-spacing:.1em;font-weight:800;padding-top:1px;}
  /* mini rows for non-today preview */
  .mini{margin-top:11px;display:flex;flex-direction:column;gap:8px;}
  .mrow{display:flex;gap:10px;align-items:baseline;}
  .mrow .mt{font-size:12.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;min-width:42px;}
  .mrow .mn{font-size:13.5px;color:var(--ink);line-height:1.25;}
  .seeall{margin-top:10px;font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.02em;}
  .emptyday{margin-top:10px;font-size:12.5px;color:var(--muted2);}
  .empty{text-align:center;color:var(--muted2);padding:50px 20px;font-size:14px;}
  .skeleton{height:118px;border-radius:var(--r);background:linear-gradient(100deg,var(--card) 30%,var(--card2) 50%,var(--card) 70%);background-size:200% 100%;animation:sh 1.2s infinite;border:1px solid var(--line);}
  @keyframes sh{to{background-position:-200% 0}}
  .scrim{position:fixed;inset:0;background:rgba(8,5,12,.62);backdrop-filter:blur(3px);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;}
  .scrim.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;max-width:680px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--line);transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
  .sheet.on{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:10px auto 4px;}
  .sheet-h{padding:8px 18px 12px;border-bottom:1px solid var(--line);}
  .sheet-hrow{display:flex;align-items:center;gap:12px;}
  .sheet-h .ch-name{font-size:18px;}
  .stabs{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:12px;scrollbar-width:none;}
  .stabs::-webkit-scrollbar{display:none;}
  .stab{flex:0 0 auto;padding:6px 11px;border-radius:11px;border:1px solid var(--line);background:transparent;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;text-transform:capitalize;white-space:nowrap;}
  .stab.sel{background:var(--ink);color:#1a1221;border-color:transparent;}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 24px;}
  .slot{display:flex;gap:14px;padding:13px 18px;border-bottom:1px solid rgba(58,46,73,.5);}
  .slot .st{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;min-width:46px;color:var(--muted);}
  .slot.live{background:linear-gradient(90deg,rgba(224,70,58,.14),transparent);}
  .slot.live .st{color:var(--redhot);}
  .slot.past{opacity:.45;}
  .slot .tt{font-family:"Fraunces",serif;font-weight:600;font-size:15px;line-height:1.25;}
  .slot .dd{font-size:12px;color:var(--muted2);margin-top:4px;line-height:1.4;}
  .slot .gg{font-size:11px;color:var(--muted2);margin-top:3px;font-weight:600;}
  .nowtag{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--redhot);border:1px solid var(--redhot);padding:2px 6px;border-radius:6px;margin-left:auto;align-self:flex-start;}
  .note{font-size:11px;color:var(--muted2);text-align:center;padding:14px 24px 4px;line-height:1.5;}
  .sheet-empty{padding:40px 24px;text-align:center;color:var(--muted2);font-size:13.5px;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brandrow">
      <div class="brand">Tele<span class="es">España</span></div>
      <div class="clock"><div class="t" id="clock">--:--</div><div class="d" id="date">—</div></div>
    </div>
    <div class="statusrow">
      <span class="live on" id="liveTag"><span class="dot"></span> <span id="liveLabel">Conectando…</span></span>
      <span class="srcnote" id="srcNote"></span>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Buscar canal…" autocomplete="off">
    </div>
    <div class="days" id="days"></div>
  </div>
</header>

<main class="wrap"><div class="list" id="list"></div></main>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sheet-h">
    <div class="sheet-hrow">
      <div class="logo" id="sheetLogo">·</div>
      <div><div class="ch-name" id="sheetName">Canal</div><div class="ch-num" id="sheetNum"></div></div>
    </div>
    <div class="stabs" id="stabs"></div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
  <div class="note" id="sheetNote"></div>
</div>

<script>
/* ============================ CONFIG ============================ */
const FEED_ENDPOINT="/.netlify/functions/epg";
const GENRE={"noticias":"#5b9bd5","informativos":"#5b9bd5","cine":"#b98cff","pelicula":"#b98cff","película":"#b98cff","serie":"#36c6b0","series":"#36c6b0","magacin":"#f0b646","magazine":"#f0b646","entretenimiento":"#f0b646","concurso":"#ff7eb0","deportes":"#5fd07a","futbol":"#5fd07a","fútbol":"#5fd07a","infantil":"#7ec8ff","documental":"#c9a66b","documentales":"#c9a66b","corazon":"#ff8fa3","corazón":"#ff8fa3","reality":"#ff8fa3","musica":"#c08af0","música":"#c08af0"};
function genreColor(g){const k=(g||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").split(/[\s,/]+/)[0];if(GENRE[k])return GENRE[k];let h=0;for(const c of (g||"x"))h=(h*31+c.charCodeAt(0))>>>0;return `hsl(${h%360} 45% 62%)`;}

/* ===================== SAMPLE FALLBACK DATA ===================== */

function midnight(off){const d=new Date();d.setHours(0,0,0,0);return d.getTime()+off*864e5;}
function sampleModel(){
  const lo=Date.now()-12*36e5,hi=Date.now()+8*24*36e5;
  const channels=SAMPLE.map(ch=>{
    const base=ch.slots.map(([t,title,g])=>{const[h,m]=t.split(":").map(Number);return{min:h*60+m,title,g};}).sort((a,b)=>a.min-b.min);
    let starts=[];
    for(let off=-1;off<=7;off++) for(const s of base) starts.push({s:midnight(off)+s.min*60000,t:s.title,g:s.g});
    starts.sort((a,b)=>a.s-b.s);
    const progs=starts.map((p,i)=>({s:p.s,e:(starts[i+1]?starts[i+1].s:p.s+36e5),t:p.t,g:p.g})).filter(p=>p.e>=lo&&p.s<=hi);
    return {name:ch.name,num:ch.num,color:ch.color,icon:"",programmes:progs};
  });
  return {tz:Intl.DateTimeFormat().resolvedOptions().timeZone,channels,sample:true};
}

/* ========================= STATE + LOAD ========================= */
let MODEL=null,selectedDay=null;
async function loadData(){
  try{const r=await fetch(FEED_ENDPOINT,{cache:"no-store"});
    if(r.ok){const j=await r.json();if(j.channels&&j.channels.length){MODEL={...j,sample:false};indexDays();return;}}
  }catch(e){}
  MODEL=sampleModel();indexDays();
}
function keyOf(ms){return new Intl.DateTimeFormat("en-CA",{timeZone:MODEL.tz,year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(ms));}
function indexDays(){
  const set=new Set();
  for(const ch of MODEL.channels){ch._days={};for(const p of ch.programmes){const k=keyOf(p.s);(ch._days[k]=ch._days[k]||[]).push(p);}for(const k in ch._days)ch._days[k].sort((a,b)=>a.s-b.s);Object.keys(ch._days).forEach(k=>set.add(k));}
  MODEL.dayKeys=[...set].sort().slice(0,8);
  MODEL.todayKey=keyOf(Date.now());MODEL.tomorrowKey=keyOf(Date.now()+864e5);
  if(!selectedDay||!MODEL.dayKeys.includes(selectedDay)) selectedDay=MODEL.dayKeys.includes(MODEL.todayKey)?MODEL.todayKey:MODEL.dayKeys[0];
}

/* =========================== HELPERS =========================== */
const fmtT=ms=>new Intl.DateTimeFormat("es-ES",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:MODEL.tz}).format(new Date(ms));
const minOfDay=ms=>{const s=new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:MODEL.tz}).format(new Date(ms));const[h,m]=s.split(":").map(Number);return h*60+m;};
function dayLabel(key){
  if(key===MODEL.todayKey)return{top:"Hoy",sub:""};
  if(key===MODEL.tomorrowKey)return{top:"Mañana",sub:""};
  const[Y,M,D]=key.split("-").map(Number);const ms=Date.UTC(Y,M-1,D,12,0,0);
  const wd=new Intl.DateTimeFormat("es-ES",{weekday:"short",timeZone:MODEL.tz}).format(ms).replace(".","");
  const dd=new Intl.DateTimeFormat("es-ES",{day:"numeric",timeZone:MODEL.tz}).format(ms);
  return{top:wd,sub:dd};
}
function curIndex(p){const n=Date.now();let i=p.findIndex(x=>n>=x.s&&n<x.e);if(i<0)i=p.findIndex(x=>x.s>n);if(i<0)i=p.length-1;return i;}
function initials(name){return name.split(" ").map(w=>w[0]).join("").slice(0,3).toUpperCase();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function shade(hex,p){const n=parseInt(hex.slice(1),16);let r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function prime(progs){let best=progs[0],bd=1e9;for(const p of progs){const d=Math.abs(minOfDay(p.s)-(21*60+30));if(d<bd){bd=d;best=p;}}return best;}

/* =========================== RENDER ============================ */
const listEl=document.getElementById("list"),daysEl=document.getElementById("days");
function showStatus(){
  const tag=document.getElementById("liveTag"),lbl=document.getElementById("liveLabel"),note=document.getElementById("srcNote");
  if(MODEL.sample){tag.className="live sample";lbl.textContent="Datos de muestra";note.textContent="· no se pudo cargar la guía en directo";}
  else{tag.className="live on";lbl.textContent="En directo · datos reales";note.textContent="· hora peninsular española";}
}
function renderDays(){
  daysEl.innerHTML=MODEL.dayKeys.map(k=>{const l=dayLabel(k);return `<div class="day ${k===selectedDay?'sel':''}" data-k="${k}"><div class="dtop">${l.top}</div>${l.sub?`<div class="dsub">${l.sub}</div>`:`<div class="dsub">&nbsp;</div>`}</div>`;}).join("");
  [...daysEl.querySelectorAll(".day")].forEach(el=>el.onclick=()=>{selectedDay=el.dataset.k;renderDays();renderList(document.getElementById("q").value);});
}
function renderList(filter=""){
  if(!MODEL){listEl.innerHTML='<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';return;}
  const f=filter.trim().toLowerCase();
  const shown=MODEL.channels.filter(c=>c.name.toLowerCase().includes(f)||String(c.num).includes(f));
  if(!shown.length){listEl.innerHTML='<div class="empty">No se encontró ningún canal.</div>';return;}
  const isToday=selectedDay===MODEL.todayKey;
  listEl.innerHTML=shown.map(ch=>{
    const gi=MODEL.channels.indexOf(ch);
    const progs=(ch._days&&ch._days[selectedDay])||[];
    const logo=ch.icon?`<img src="${ch.icon}" loading="lazy" onerror="this.remove()">`:initials(ch.name);
    const head=`<div class="top"><div class="logo" style="background:linear-gradient(145deg,${ch.color},${shade(ch.color,-28)})">${logo}</div><div class="ch-meta"><div class="ch-name">${esc(ch.name)}</div><div class="ch-num">Canal ${ch.num}</div></div><div class="chev">›</div></div>`;
    if(!progs.length) return `<div class="card" data-i="${gi}">${head}<div class="emptyday">Sin información de programación para este día.</div></div>`;
    if(isToday){
      const i=curIndex(progs),cur=progs[i],nxt=progs[i+1];
      const pct=Math.max(0,Math.min(100,((Date.now()-cur.s)/(cur.e-cur.s))*100));
      return `<div class="card" data-i="${gi}">${head}
        <div class="now-title">${esc(cur.t)}</div>
        <div class="row"><span class="time">${fmtT(cur.s)} – ${fmtT(cur.e)}</span>${cur.g?`<span class="badge" style="background:${genreColor(cur.g)}">${esc(cur.g)}</span>`:""}</div>
        <div class="progwrap"><div class="bar"><i style="width:${pct}%"></i></div></div>
        ${nxt?`<div class="next"><span class="lbl">Luego</span><b>${fmtT(nxt.s)}</b> ${esc(nxt.t)}</div>`:""}</div>`;
    }
    // other day: show evening preview (3 progs from 20:00), else first 3
    let ev=progs.filter(p=>minOfDay(p.s)>=20*60).slice(0,3);
    if(!ev.length)ev=progs.slice(0,3);
    const ph=prime(progs);
    return `<div class="card" data-i="${gi}">${head}
      <div class="now-title">${esc(ph.t)}</div>
      <div class="row"><span class="time">${fmtT(ph.s)}</span>${ph.g?`<span class="badge" style="background:${genreColor(ph.g)}">${esc(ph.g)}</span>`:""}</div>
      <div class="mini">${ev.map(p=>`<div class="mrow"><span class="mt">${fmtT(p.s)}</span><span class="mn">${esc(p.t)}</span></div>`).join("")}</div>
      <div class="seeall">Ver parrilla completa · ${progs.length} programas ›</div></div>`;
  }).join("");
  [...listEl.querySelectorAll(".card")].forEach(el=>el.onclick=()=>openSheet(+el.dataset.i,selectedDay));
}
function renderAll(){renderDays();renderList(document.getElementById("q").value);}

/* ============================ SHEET ============================ */
const scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet");
let sheetIdx=null,sheetDay=null;
function openSheet(idx,day){
  sheetIdx=idx;const ch=MODEL.channels[idx];
  sheetDay=(ch._days&&ch._days[day])?day:Object.keys(ch._days||{}).sort()[0]||MODEL.todayKey;
  document.getElementById("sheetName").textContent=ch.name;
  document.getElementById("sheetNum").textContent="Canal "+ch.num+" · Parrilla semanal";
  const lg=document.getElementById("sheetLogo");
  lg.innerHTML=ch.icon?`<img src="${ch.icon}" onerror="this.parentNode.textContent='${initials(ch.name)}'">`:initials(ch.name);
  lg.style.background=`linear-gradient(145deg,${ch.color},${shade(ch.color,-28)})`;
  document.getElementById("sheetNote").innerHTML=MODEL.sample?"Programación de muestra.":"Guía en directo · hora peninsular española · fuente: "+esc(MODEL.source||"EPG");
  renderSheet();
  scrim.classList.add("on");sheet.classList.add("on");
}
function renderSheet(){
  const ch=MODEL.channels[sheetIdx];
  const keys=Object.keys(ch._days||{}).sort().slice(0,8);
  document.getElementById("stabs").innerHTML=keys.map(k=>{const l=dayLabel(k);return `<div class="stab ${k===sheetDay?'sel':''}" data-k="${k}">${l.top}${l.sub?" "+l.sub:""}</div>`;}).join("");
  [...document.querySelectorAll("#stabs .stab")].forEach(el=>el.onclick=()=>{sheetDay=el.dataset.k;renderSheet();});
  const p=(ch._days&&ch._days[sheetDay])||[];
  const body=document.getElementById("sheetBody");
  if(!p.length){body.innerHTML='<div class="sheet-empty">Sin información de programación para este día.</div>';return;}
  const isToday=sheetDay===MODEL.todayKey,ci=isToday?curIndex(p):-1;
  body.innerHTML=p.map((s,i)=>{
    const live=isToday&&i===ci,past=Date.now()>=s.e;
    return `<div class="slot ${live?'live':''} ${past&&!live?'past':''}">
      <div class="st">${fmtT(s.s)}</div>
      <div style="flex:1"><div class="tt">${esc(s.t)}</div>
        ${s.g?`<div class="gg" style="color:${genreColor(s.g)}">● ${esc(s.g)}</div>`:""}
        ${s.d?`<div class="dd">${esc(s.d)}</div>`:""}</div>
      ${live?'<span class="nowtag">AHORA</span>':''}</div>`;
  }).join("");
  const liveEl=body.querySelector(".slot.live");if(liveEl)setTimeout(()=>liveEl.scrollIntoView({block:"center"}),50);
}
scrim.onclick=()=>{scrim.classList.remove("on");sheet.classList.remove("on");};

/* ========================= CLOCK + BOOT ========================= */
const DIAS=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"],MES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function tick(){const d=new Date();document.getElementById("clock").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");document.getElementById("date").textContent=`${DIAS[d.getDay()]}, ${d.getDate()} ${MES[d.getMonth()]}`;}
tick();setInterval(tick,1000);
renderList(); // skeleton
(async()=>{await loadData();showStatus();renderAll();})();
setInterval(()=>{if(selectedDay===MODEL?.todayKey)renderList(document.getElementById("q").value);},30000);
setInterval(async()=>{await loadData();showStatus();renderAll();},30*60000);
document.getElementById("q").addEventListener("input",e=>renderList(e.target.value));
